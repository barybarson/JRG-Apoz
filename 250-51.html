<script>
const data={
"Kabina":["Detektor prądu zmiennego HotStick","Dalmierz BOSCH","Gaśnica GP"],
"Skrytka 1 prawa":["Aparaty ODO","Halligan","Pilarka akumulatorowa STIHL"],

"Podest":["Agregat prądotwórczy","Deska ortopedyczna"]
};
let pool=[],i=0,score=0;

function show(id){
 ['learn','exam','stats'].forEach(x=>document.getElementById(x).classList.add('hidden'));
 document.getElementById(id).classList.remove('hidden');
 if(id==='exam')startExam();
 if(id==='stats'){
   document.getElementById('st').innerHTML=
   'Najlepszy wynik: '+(localStorage.bestExam||'-')+'<br>Egzaminów: '+(localStorage.examCount||0);
 }
}

function startExam(){
 pool=[];
 for(let l in data) data[l].forEach(e=>pool.push({item:e,loc:l}));
 pool.sort(()=>Math.random()-0.5);
 pool=pool.slice(0,20);
 i=0;score=0;
 next();
}

function next(){
 if(i>=pool.length){
   document.getElementById('q').innerHTML='<h2>Wynik '+score+'/20 ('+Math.round(score/20*100)+'%)</h2>';
   let best=Math.max(score,Number(localStorage.bestExam||0));
   localStorage.bestExam=best;
   localStorage.examCount=Number(localStorage.examCount||0)+1;
   document.getElementById('item').textContent='';
   document.getElementById('answers').innerHTML='';
   document.getElementById('feedback').textContent='';
   return;
 }
 let p=pool[i];
 q.innerHTML='Pytanie '+(i+1)+'/20';
 item.textContent='Gdzie znajduje się: '+p.item+' ?';
 let opts=[p.loc];
 while(opts.length<4){
   let k=Object.keys(data)[Math.floor(Math.random()*Object.keys(data).length)];
   if(!opts.includes(k)) opts.push(k);
 }
 opts.sort(()=>Math.random()-0.5);
 answers.innerHTML='';
 feedback.textContent='';
 opts.forEach(o=>{
   let b=document.createElement('button');
   b.className='answer';
   b.textContent=o;
   b.onclick=()=>{
      if(o===p.loc){score++;feedback.innerHTML='✅ Poprawnie';}
      else feedback.innerHTML='❌ Poprawna odpowiedź: <b>'+p.loc+'</b>';
      setTimeout(()=>{i++;next();},900);
   };
   answers.appendChild(b);
 });
}
</script>
