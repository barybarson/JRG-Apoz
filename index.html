<!DOCTYPE html><html lang="pl"><head><meta charset="utf-8">
<title>SD-30 Magirus Quiz V4</title>
<style>
body{font-family:Arial;background:#eef2f5;margin:0}
.app{max-width:850px;margin:25px auto;background:#fff;padding:25px;border-radius:14px;box-shadow:0 5px 18px #0002}
h1{margin:0}select,button,input{font-size:17px;padding:10px}
input{width:100%;box-sizing:border-box;margin-top:10px}
.progress{height:22px;background:#ddd;border-radius:20px;overflow:hidden;margin:10px 0}
#bar{height:100%;background:#27ae60;width:0%}
.stats{display:flex;justify-content:space-between;font-weight:bold;margin:8px 0}
.cards{display:flex;flex-wrap:wrap;gap:8px;margin-top:15px}
.card{background:#d4edda;border:1px solid #28a745;border-radius:8px;padding:8px 12px}
#msg{margin-top:10px;color:#b00;font-weight:bold}
</style>
<style>
body{background:#111827;color:#f3f4f6}
.app{background:#1f2937;color:#f3f4f6;max-width:900px}
button{background:#2563eb;color:white;border:none;border-radius:10px}
input,select{background:#374151;color:white;border:1px solid #555;border-radius:10px}
.card{animation:pop .25s ease}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
#combo,#score,#best,#rank{margin:6px 0;font-weight:bold}
</style>
<script>
let score=0,combo=0,wrong=[],exam=false,best=JSON.parse(localStorage.getItem("bestTimes")||"{}");
function beep(ok){let c=new (window.AudioContext||window.webkitAudioContext)();let o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=ok?880:220;g.gain.value=.08;o.start();o.stop(c.currentTime+.12);}
function saveBest(name,t){if(!best[name]||t<best[name]){best[name]=t;localStorage.setItem("bestTimes",JSON.stringify(best));}}
function renderExtra(){
 if(!document.getElementById('score')){
  let d=document.createElement('div');
  d.innerHTML='<div id="score">🏆 Punkty: 0</div><div id="combo">🔥 Combo: 0</div><div id="best"></div><button onclick="startExam()">🎲 Egzamin</button><div id="rank"></div>';
  document.querySelector('.app').insertBefore(d,document.getElementById('title'));
 }
 document.getElementById('score').innerText='🏆 Punkty: '+score;
 document.getElementById('combo').innerText='🔥 Combo: '+combo;
 document.getElementById('best').innerText='📈 Rekord: '+((best[s.value]??'-')==='-'?'-':best[s.value]+' s');
 let r=JSON.parse(localStorage.getItem('ranking')||'[]').sort((a,b)=>b-a).slice(0,5);
 document.getElementById('rank').innerHTML='Ranking: '+r.join(', ');
}
function startExam(){exam=true; s.selectedIndex=Math.floor(Math.random()*s.options.length); start();}
document.addEventListener('DOMContentLoaded',()=>{
 renderExtra();
 let old=start;
 start=function(){old();renderExtra();}
 let oldKey=inp.onkeydown;
 inp.onkeydown=function(e){
   if(e.key!='Enter')return;
   let before=ok.length;
   oldKey(e);
   if(ok.length>before){combo++;score+=10+combo;beep(true);}
   else{wrong.push(inp.value);combo=0;beep(false);}
   renderExtra();
   if(leftArr.length==0){
      let sec=Math.floor((Date.now()-st)/1000);
      saveBest(s.value,sec);
      let rr=JSON.parse(localStorage.getItem('ranking')||'[]');rr.push(score);localStorage.setItem('ranking',JSON.stringify(rr));
      missing.innerHTML+= '<h3>❌ Do powtórki:</h3><ul>'+wrong.map(x=>'<li>'+x+'</li>').join('')+'</ul>';
      if(exam){exam=false;setTimeout(()=>{if(s.selectedIndex<s.options.length-1){s.selectedIndex++;start();}},800);}
   }
 }
});
</script>
</head><body><div class="app">
<h1>🚒 SD-30 MAGIRUS</h1>
<select id="s"></select> <button onclick="start()">Nowa runda</button>
<h2 id="title"></h2>
<div class="progress"><div id="bar"></div></div>
<div class="stats"><span id="prog"></span><span>⏱ <span id="time">00:00</span></span></div>
<div class="stats"><span>Poprawnych: <span id="good">0</span></span><span>Pozostało: <span id="left">0</span></span></div>
<input id="inp" placeholder="Wpisz element...">
<div id="msg"></div>
<div class="cards" id="cards"></div>
<div id="missing"></div>
<script>
const d={
"Kabina":["Detektor prądu zmiennego HotStick","Dalmierz BOSCH","Gaśnica GP","Zestaw do podnoszenia kabiny","Klucze do kół","Rękawice dielektryczne","Lonża GRILON","Uprząż asekuracyjna"],
"Skrytka 1 prawa":["Aparaty ODO","Maski ODO","Saperka","Siekiera mała","Topór ciężki","Maczeta Fiskars","Siekieromłot Fiskars","Halligan","Wyważarka LUKAS","Pilarka akumulatorowa STIHL","Szlifierka","Gwoździarka","Worki skórzane"],
"Skrytka 2 prawa":["Najaśnica","Stojak do najaśnicy","Prądownica TurboJet52","Nożyce do prętów","Narzędzie do skuwania sopli","Prądownica PW75","Przełącznik 75/52","Rozdzielacz kulowy","Przedłużacz","Podnośnik hydrauliczny","Kanister 5l","Lejek","Wąż W52","Worek ze sprzętem","Łapka do gwoździ","Młot 5kg","Skrzynka narzędziowa","Wkrętarka HILTI","Mycie rąk"],
"Skrytka 3 prawa":["Wąż W75 20m","Wąż W75 30m","Przewody elektryczne","Klucz do łączników","Sznur polipropylenowy","Zaczep holowniczy"],
"Skrytka 1 lewa":["Szyny Kramera","PSP R-1","Półmaska","Piła szablasta","Piła do stali i betonu","Pilarka ratownicza STIHL","Pilarka gałęziówka STIHL","Kliny kompozytowe","Kanister 5l","Olej do łańcucha","Wentylator oddymiający","Szczotka druciana","Taśma szara"],
"Skrytka 2 lewa":["Skokochron","Butla do skokochronu","Zapasowa butla","Nosze płachtowe","Kaseton z odcinkiem 40m","Pasy do deski","Usztywniacz boczny"],
"Skrytka 3 lewa":["Worki wysokościowe D1","Worki wysokościowe D2","Gaśnica 4kg","Linka ratownicza 20m"],
"Podest":["Kliny pod koła","Deska ortopedyczna","Podstawa pod wentylator","Podstawa pod nosze","Kaseton z odcinkiem 40m","Pachołki składane","Uchwyt do stanowisk","Działko wodno-pianowe","Nosze składane","Agregat prądotwórczy","Podkłady pod podpory","Odcinek półsztywny W75","Drabina pomocnicza","Rura do spalin"]
};
const alias={halligan:"Halligan",hooligan:"Halligan",topor:"Topór ciężki",kramera:"Szyny Kramera",aku:"Pilarka akumulatorowa STIHL",wentylator:"Wentylator oddymiający",kanister:"Kanister 5l",hotstick:"Detektor prądu zmiennego HotStick",r1:"PSP R-1"};
for(let k in d)s.add(new Option(k,k));
let all=[],leftArr=[],ok=[],st,iv;
const norm=x=>x.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
function timer(){let t=((Date.now()-st)/1000)|0;time.textContent=String((t/60)|0).padStart(2,'0')+":"+String(t%60).padStart(2,'0')}
function upd(){good.textContent=ok.length;left.textContent=leftArr.length;let p=ok.length/all.length*100;bar.style.width=p+"%";prog.textContent=Math.round(p)+"% • "+ok.length+"/"+all.length}
function start(){clearInterval(iv);st=Date.now();iv=setInterval(timer,1000);timer();title.textContent=s.value;all=[...d[s.value]];leftArr=[...all];ok=[];cards.innerHTML="";missing.innerHTML="";msg.textContent="";upd();inp.value="";inp.focus();}
inp.onkeydown=e=>{if(e.key!="Enter")return;let v=norm(inp.value);if(alias[v])v=norm(alias[v]);let f=all.find(x=>norm(x).includes(v)||v.includes(norm(x)));if(f&&ok.includes(f)){msg.textContent="✔ "+f+" już był zaliczony";inp.value="";return;}
let i=leftArr.findIndex(x=>norm(x).includes(v)||v.includes(norm(x)));
if(i>=0){let it=leftArr.splice(i,1)[0];ok.push(it);cards.innerHTML+=`<div class='card'>✓ ${it}</div>`;msg.textContent="";upd();if(!leftArr.length){clearInterval(iv);missing.innerHTML="<h3>🎉 Zaliczone! Czas: "+time.textContent+"</h3>";}}
else msg.textContent="❌ Błędna odpowiedź";
inp.value="";inp.focus();}
start();
</script></body></html>
